name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      bash: ${{ steps.filter.outputs.bash }}
      json: ${{ steps.filter.outputs.json }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bash:
              - '**/*.sh'
              - '**/*.bats'
              - '.githooks/**'
            json:
              - '**/*.json'

  bash:
    needs: changes
    if: needs.changes.outputs.bash == 'true'
    uses: ./.github/workflows/bash.yml

  json-validate:
    needs: changes
    if: needs.changes.outputs.json == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          FAILED=0
          while IFS= read -r -d '' f; do
            if ! jq empty "$f" 2>&1; then
              echo "::error file=$f::Invalid JSON"
              FAILED=1
            fi
          done < <(find . -name '*.json' -not -path './.git/*' -print0)
          exit "$FAILED"
