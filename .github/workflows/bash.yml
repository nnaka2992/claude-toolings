name: Bash

on:
  workflow_call:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: .
          format: gcc

  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mfinelli/setup-shfmt@v2
      - name: shfmt
        run: shfmt -d $(find . -name '*.sh' -type f)

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bats-core/bats-action@main
        with:
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false
      - name: bats
        run: |
          mapfile -t BATS_TEST_FILES < <(find . -name "*_test.bats" -type f)
          if [[ ${#BATS_TEST_FILES[@]} -gt 0 ]]; then
            bats "${BATS_TEST_FILES[@]}"
          else
            echo "No test files found"
          fi
